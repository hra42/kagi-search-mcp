name: Release MCPB bundles

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: darwin-arm64,  goos: darwin,  goarch: arm64, ext: '' }
          - { name: darwin-amd64,  goos: darwin,  goarch: amd64, ext: '' }
          - { name: linux-amd64,   goos: linux,   goarch: amd64, ext: '' }
          - { name: windows-amd64, goos: windows, goarch: amd64, ext: '.exe' }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build binary
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p bundle/server
          go build -trimpath -ldflags='-s -w' \
            -o bundle/server/kagi-search-mcp${{ matrix.target.ext }} .

      - name: Stage manifest
        run: cp manifest.json .mcpbignore bundle/

      - name: Pack bundle
        run: |
          npx -y @anthropic-ai/mcpb pack bundle \
            kagi-search-mcp-${{ github.ref_name }}-${{ matrix.target.name }}.mcpb

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target.name }}
          path: kagi-search-mcp-*.mcpb
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lah dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*.mcpb
